services:
  - type: web
    name: academic-analytics-accreditation
    env: python
    plan: starter
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn app:app --app-dir backend --host 0.0.0.0 --port $PORT
    healthCheckPath: /api-info
    envVars:
      - key: ACCREDITATION_DB_PATH
        value: /var/data/accreditation.db
      - key: EXPORTS_DIR
        value: /var/data/exports
      - key: ALLOWED_ORIGINS
        sync: false
    disk:
      name: accreditation-data
      mountPath: /var/data
      sizeGB: 1
