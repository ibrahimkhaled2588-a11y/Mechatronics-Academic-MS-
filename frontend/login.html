<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign In – Indicators Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="dashboard-page login-page">
    <main class="login-main">
        <form id="login-form" class="login-card">
            <h1 class="login-title">Indicators Tracker</h1>
            <p class="section-desc">Sign in with the account your coordinator gave you.</p>
            <label class="login-field">
                <span>Username</span>
                <input type="text" id="login-username" autocomplete="username" required>
            </label>
            <label class="login-field">
                <span>Password</span>
                <input type="password" id="login-password" autocomplete="current-password" required>
            </label>
            <button type="submit" class="cta-btn login-submit">Sign In</button>
            <p id="login-error" class="login-error" hidden></p>
        </form>
    </main>
    <script src="/static/js/login.js"></script>
</body>
</html>
