<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Indicators Tracker – Accreditation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="dashboard-page indicators-page">
    <header class="dashboard-header">
        <div class="header-inner">
            <a href="index.html" class="back-home" title="Home">← Home</a>
            <h1>Accreditation Indicators Tracker</h1>
            <div class="header-actions">
                <nav class="top-nav">
                    <a href="dashboard.html" class="nav-link">Quality Dashboard</a>
                    <a href="course-report.html" class="nav-link">Course Report</a>
                    <a href="program-report.html" class="nav-link">Program Report</a>
                    <a href="survey-dashboard.html" class="nav-link">Survey Dashboard</a>
                    <a href="curriculum-mapping.html" class="nav-link">🗺️ Curriculum Map</a>
                    <a href="indicators-tracker.html" class="nav-link nav-link-active">📋 Indicators</a>
                    <a href="qa-chat.html" class="nav-link">🎓 QA Chat</a>
                </nav>
            </div>
        </div>
    </header>
    <main class="dashboard-main">
        <section class="indicators-summary-section">
            <h2 class="section-label">Progress by Standard</h2>
            <div id="standard-summary-grid" class="indicators-summary-grid"></div>
        </section>

        <section class="indicators-filter-bar">
            <label>
                Standard
                <select id="filter-standard">
                    <option value="">All standards</option>
                </select>
            </label>
            <label>
                Status
                <select id="filter-status">
                    <option value="">All statuses</option>
                    <option value="missing">Missing</option>
                    <option value="partial">Partial</option>
                    <option value="complete">Complete</option>
                </select>
            </label>
            <button type="button" id="add-indicator-btn" class="btn-header btn-header-primary">+ Add Indicator</button>
        </section>

        <div id="add-indicator-form" class="indicator-add-form" hidden>
            <select id="new-standard"></select>
            <input type="text" id="new-text" placeholder="Indicator text">
            <input type="text" id="new-responsible" placeholder="Responsible person (optional)">
            <input type="date" id="new-due-date">
            <button type="button" id="save-new-indicator-btn" class="btn-header btn-header-primary">Save</button>
            <button type="button" id="cancel-new-indicator-btn" class="btn-header btn-header-secondary">Cancel</button>
        </div>

        <section id="standards-container"></section>
    </main>
    <script src="/static/js/indicators_tracker.js"></script>
</body>
</html>
